# repo-task-core.yml
#
# Reusable core task workflow — callable from target repos via workflow_call.
#
# This workflow contains the actual task logic (checkout, GHAS findings fetch,
# artifact upload) without duplicate-run detection or App token minting.
# Those concerns belong to the orchestrator wrapper (repo-task.yml) or to the
# calling workflow in the target repo.
#
# Token strategy:
#   GHAS API calls use GHAS_TOKEN if provided, otherwise fall back to github.token.
#
#   GHAS_TOKEN should be a fine-grained PAT with "Security events: read" permission
#   scoped to the target repository. It is required for Dependabot alerts because
#   github.token in a cross-repo workflow_call context cannot access the Dependabot
#   alerts API (GitHub platform restriction — returns 403 regardless of permissions).
#
#   CodeQL and Secret Scanning alerts work with github.token + security-events: read.
#   Only Dependabot alerts require the fine-grained PAT.
#
# Setup for target repos:
#   1. Create a fine-grained PAT with "Security events: read" scoped to the target repo.
#   2. Store it as a repo secret named GHAS_TOKEN in the target repo.
#   3. Pass it explicitly in the caller workflow: secrets: { GHAS_TOKEN: ${{ secrets.GHAS_TOKEN }} }
#
# Usage from a target repo:
#
#   permissions:
#     contents: read
#     security-events: read
#
#   jobs:
#     task:
#       uses: <orchestrator-org>/reusable-workflow-playground/.github/workflows/repo-task-core.yml@main
#       with:
#         dry_run: 'false'
#         runner: ubuntu-latest   # optional
#       secrets:
#         GHAS_TOKEN: ${{ secrets.GHAS_TOKEN }}   # fine-grained PAT stored in the target repo

name: Repo Task (Core)
run-name: "repo-task-core/${{ github.repository }}"

on:
  workflow_call:
    inputs:
      dry_run:
        description: 'If true, skip side-effects and simulate token usage'
        required: false
        type: string
        default: 'false'
      runner:
        description: 'Runner label to use (e.g. ubuntu-latest or arc-task-runner-set)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      GHAS_TOKEN:
        description: >
          Fine-grained PAT with "Security events: read" scoped to the target repo.
          Required for Dependabot alerts — github.token cannot access the Dependabot
          alerts API in a cross-repo workflow_call context (GitHub platform restriction).
          If not provided, github.token is used (CodeQL and Secret Scanning will still work).
        required: false
      EXTERNAL_API_KEY:
        description: 'Reserved for future use by an external API (e.g. LLM); not used by the current GHAS task'
        required: false
    outputs:
      status:
        description: 'Task result: success or failed'
        value: ${{ jobs.task.outputs.status }}
      repo:
        description: 'The repository this workflow ran against'
        value: ${{ jobs.task.outputs.repo }}
      tokens_used:
        description: 'Number of tokens consumed (0 for GHAS tasks; simulated for dry_run)'
        value: ${{ jobs.task.outputs.tokens_used }}

jobs:
  task:
    runs-on: ${{ inputs.runner }}
    outputs:
      status: ${{ steps.status.outputs.result }}
      repo: ${{ github.repository }}
      tokens_used: ${{ steps.write-output.outputs.tokens_used }}
    steps:
      - name: Extract repo owner and name
        id: repo-parts
        run: |
          echo "owner=${REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${REPO##*/}"  >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: main

      - name: Fetch GHAS findings — CodeQL alerts
        id: codeql
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Fetching CodeQL alerts for $REPO..."
          raw=""
          if raw=$(gh api --paginate \
              "repos/$REPO/code-scanning/alerts?state=open&tool_name=CodeQL" \
              2>&1); then
            echo "$raw" | jq -c '[.[] | {
              number: .number,
              rule_id: .rule.id,
              rule_severity: .rule.severity,
              rule_description: .rule.description,
              path: .most_recent_instance.location.path,
              start_line: .most_recent_instance.location.start_line,
              html_url: .html_url
            }]' > codeql-alerts.json
          else
            if echo "$raw" | grep -qE '"status":"404"|"status":"403"|HTTP 404|HTTP 403'; then
              echo "CodeQL not enabled or not licensed for $REPO — writing empty list."
            else
              echo "WARNING: Unexpected error fetching CodeQL alerts: $raw"
            fi
            echo '[]' > codeql-alerts.json
          fi
          count=$(jq 'length' codeql-alerts.json)
          echo "CodeQL open alerts: $count"

      - name: Fetch GHAS findings — Dependabot alerts
        id: dependabot
        if: inputs.dry_run != 'true'
        env:
          # Use GHAS_TOKEN (fine-grained PAT) if provided; fall back to github.token.
          # github.token cannot access Dependabot alerts in cross-repo workflow_call
          # (GitHub platform restriction — 403 regardless of permissions block).
          GH_TOKEN: ${{ secrets.GHAS_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Fetching Dependabot alerts for $REPO..."
          if [ -n "${{ secrets.GHAS_TOKEN }}" ]; then
            echo "Using GHAS_TOKEN (fine-grained PAT)."
          else
            echo "GHAS_TOKEN not set — using github.token (may return 403 in cross-repo workflow_call)."
          fi
          raw=""
          if raw=$(gh api --paginate \
              "repos/$REPO/dependabot/alerts?state=open" \
              2>&1); then
            echo "$raw" | jq -c '[.[] | {
              number: .number,
              ghsa_id: .security_advisory.ghsa_id,
              cve_id: .security_advisory.cve_id,
              severity: .security_advisory.severity,
              summary: .security_advisory.summary,
              package_ecosystem: .dependency.package.ecosystem,
              package_name: .dependency.package.name,
              manifest_path: .dependency.manifest_path,
              vulnerable_version_range: .security_vulnerability.vulnerable_version_range,
              first_patched_version: .security_vulnerability.first_patched_version.identifier,
              html_url: .html_url
            }]' > dependabot-alerts.json
          else
            if echo "$raw" | grep -q '"status":"403"'; then
              echo "WARNING: 403 fetching Dependabot alerts for $REPO."
              echo "  Store a fine-grained PAT (Security events: read) as secret GHAS_TOKEN"
              echo "  in the target repo and use 'secrets: inherit' in the caller workflow."
            elif echo "$raw" | grep -qE '"status":"404"'; then
              echo "WARNING: Dependabot not enabled for $REPO (404) — writing empty list."
            else
              echo "WARNING: Unexpected error fetching Dependabot alerts: $raw"
            fi
            echo '[]' > dependabot-alerts.json
          fi
          count=$(jq 'length' dependabot-alerts.json)
          echo "Dependabot open alerts: $count"

      - name: Fetch GHAS findings — Secret Scanning alerts
        id: secret-scanning
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Fetching Secret Scanning alerts for $REPO..."
          raw=""
          if raw=$(gh api --paginate \
              "repos/$REPO/secret-scanning/alerts?state=open" \
              2>&1); then
            echo "$raw" > secret-scanning-alerts.json
          else
            if echo "$raw" | grep -qE '"status":"404"|"status":"403"|HTTP 404|HTTP 403'; then
              echo "Secret Scanning not enabled or not licensed for $REPO — writing empty list."
            else
              echo "WARNING: Unexpected error fetching Secret Scanning alerts: $raw"
            fi
            echo '[]' > secret-scanning-alerts.json
          fi
          count=$(jq 'length' secret-scanning-alerts.json)
          echo "Secret Scanning open alerts: $count"

      - name: Sanitize artifact name
        id: artifact-name
        run: |
          # Replace slashes and other characters that are invalid in artifact names
          safe_repo=$(echo "${{ github.repository }}" | tr '/' '-' | tr -cd '[:alnum:]-_.')
          echo "value=ghas-findings-${safe_repo}" >> "$GITHUB_OUTPUT"

      - name: Upload GHAS findings artifact
        if: inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.value }}
          path: |
            codeql-alerts.json
            dependabot-alerts.json
            secret-scanning-alerts.json
          if-no-files-found: warn
          retention-days: 30

      - name: Mark status
        id: status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Write task output
        id: write-output
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            # Simulate token usage for dry_run mode
            tokens_used=$((RANDOM % 5000 + 500))
            echo "dry_run=true — simulated tokens used: $tokens_used"
          else
            # GHAS fetch tasks do not consume LLM tokens
            tokens_used=0
            echo "tokens_used=0 (GHAS task — no LLM calls)"
          fi
          echo "tokens_used=$tokens_used" >> "$GITHUB_OUTPUT"
